<!DOCTYPE html>
<html lang="en">
<head>
<title>Font Subsetter</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Font subsetter and woff2 converter.">
<meta name="theme-color" content="#282828">
<link rel="icon" href="/favicon.svg" sizes="any" type="image/svg+xml">
<link rel="apple-touch-icon" href="/apple.png">
<link rel="manifest" href="/pwa.json">
<link rel="canonical" href="https://www.couique.com/font-subsetter">
<style>
@import './fonts/asap.css';
*{margin:0;padding:0;box-sizing:border-box}
html{width:100%;height:100%;background:#282828;color:#eee;font:400 clamp(7.5pt, calc(4pt + 1vw), 36pt) __asap__,sans-serif;font-stretch:115%;line-height:1.4}
body{min-height:100%;padding:2em;display:grid;align-content:space-evenly;justify-items:center;gap:1em}
body[inert]:after{position:absolute;inset:0;background:rgba(40,40,40,.8);display:grid;place-items:center;animation:loop 1200ms linear 600ms infinite;content:'';font:800 4em monospace;font-style:normal}
@keyframes loop{0%,100%{content:'⠋'}10%{content:"⠙"}20%{content:"⠹"}30%{content:"⠸"}40%{content:"⠼"}50%{content:"⠴"}60%{content:"⠦"}70%{content:"⠧"}80%{content:"⠇"}90%{content:"⠏"}}
body.dragover>*{pointer-events:none}
body.dragover{
  --conic-bg-angle:0deg;animation:conic-bg-angle 4s infinite linear;
  background:conic-gradient(from var(--conic-bg-angle) at 125% 50%, #282828, #1f2b3a, #312837, #1f2b3a, #282828);
}
@keyframes conic-bg-angle{100%{--conic-bg-angle:1turn}}@property --conic-bg-angle{syntax:'<angle>';inherits:false;initial-value:0deg}
h1{color:#daf;font-size:2rem;text-align:center;font-weight:900;font-stretch:125%;font-style:italic;letter-spacing:.05em;text-wrap:pretty}
h1>span{-webkit-text-stroke:initial;color:#9bf6ff}
a,button,input[type="file"]+label{color:#adf;text-decoration-color:rgba(170,221,255,.5);text-decoration:underline;cursor:pointer}a:hover,button:hover,input[type="file"]+label:hover{color:#6af}
input[type="file"]{width:10px;height:10px;opacity:0;overflow:hidden;position:absolute;z-index:-1;pointer-events:none}
main{display:grid;grid-template-columns:1fr;grid-template-rows:auto 1fr;gap:1em;justify-items:center;align-items:center;max-width:80vw}
#slider{}
.preview{
  height:6rem;
  overflow:auto;
  font-size:calc(var(--size,100)/100*1em);
  font-variation-settings:"slnt" var(--slnt,0),"wdth" var(--wdth,0),"wght" var(--wght,0);
  outline:none;
  scrollbar-gutter:stable;
  display:grid;
  place-items:center;
  text-align:center;
  caret-shape:block;
  caret-color:#adf;
  text-wrap:pretty;
}
.tables{
  justify-self:stretch;
  display:grid;
  grid-template-columns:1fr;
  gap:1em;
}
.table{
  display:grid;
  grid-auto-flow:row;
  grid-template-columns:repeat(auto-fill,2.5em);
  gap:.25em;
}
.table>h3{
  grid-column:1 / -1;
  text-align:center;
}
.codepoint{
  width:2.5em;height:2.5em;
  display:grid;place-items:center;
  border:1px solid rgb(from currentColor r g b / .25);
  border-radius:.25em;
  padding:.25em;
}
.codepoint.disabled>span{opacity:.1}
</style>
</head>
<body>
<h1>Font Subsetter</h1>
<main>
  <div>Paste, drag &amp; drop,<br>or <input tabindex="0" type="file" id="file" title=" "><label for="file">select a font file</label> (ttf, otf or woff2).</div>
</main>
</body>
<script type="module">
let mod=import('./font-subsetter/lib.mjs');
const container=document.querySelector('main');
let controller;
let fontFace;
const open=async(blob)=>{
  if(!blob) return;
  controller?.abort();
  controller=new AbortController();
  const signal=controller.signal;
  const timeout=setTimeout(()=>document.body.setAttribute('inert',''),100);
  try{
    let data=await new Promise((resolve,reject)=>{
      const reader=new FileReader();
      signal.onabort=e=>{
        reader.abort();
        reject(e);
      };
      reader.onload=e=>resolve(new Uint8Array(e.target.result));
      reader.onerror=e=>reject(e?.target?.error||e);
      reader.readAsArrayBuffer(blob);
    });
    const {metadata,subset: _subset}=await mod;
    const info=await metadata(data,signal);
    data=info.input;
    delete info.input;
    console.log(JSON.stringify(info,null,2));
    const wdth=info.axes.find(axis=>axis.tag==='wdth');
    const wght=info.axes.find(axis=>axis.tag==='wght');
    const slnt=info.axes.find(axis=>axis.tag==='slnt');
    const descriptors={};
    if(wdth) descriptors.stretch=`${wdth.min}% ${wdth.max}%`;
    descriptors.weight=wght?`${wght.min} ${wght.max}`:'normal';
    descriptors.style=slnt?`oblique ${-slnt.max}deg ${-slnt.min}deg`:'normal';
    if(signal.aborted) return;
    const previousFontFace=fontFace;
    const newFontFace=new FontFace(`__${info.family_name}`,data,descriptors);
    let fontLoaded=false;
    try{
      await newFontFace.load();
      fontLoaded=true;
    }catch(e){
      console.error(e);
    }
    if(signal.aborted|| !fontLoaded) return;
    container.textContent='';
    if(previousFontFace) await document.fonts.delete(previousFontFace);
    fontFace=newFontFace;
    await document.fonts.add(fontFace);
    const sliders=document.createElement('ul');
    sliders.classList.add('sliders');
    for (const {tag,min,max,default:value} of [{tag:'size',min:'50','max':'200'},...info.axes??[]]){
      const li=document.createElement('li');
      li.classList.add('axis-slider');
      const label=document.createElement('label');
      label.textContent=tag;
      const input=document.createElement('input');
      input.type='range';
      input.max=max;
      input.min=min;
      input.value=value;
      input.addEventListener('change',_=>{
        container.style.setProperty(`--${tag}`,input.value);
      });
      label.appendChild(input);
      li.appendChild(label);
      sliders.appendChild(li);
    }
    container.appendChild(sliders);
    const preview=document.createElement('div');
    preview.contentEditable='plaintext-only';
    preview.classList.add('preview');
    preview.style.fontFamily=`__${info.family_name}`;
    preview.textContent=`The quick brown fox jumps over the lazy dog.\nA very bad quack might jinx zippy fowls; beware!`;
    container.appendChild(preview);
    if(info.features?.length){
      const features=document.createElement('ul');
      features.classList.add('features');
      for(const {tag,name} of info.features){
        const li=document.createElement('li');
        const label=document.createElement('label');
        label.textContent=name;
        const code=document.createElement('code');
        code.textContent=tag;
        label.appendChild(code);
        li.appendChild(label);
        features.appendChild(li);
      }
      container.appendChild(features);
    }
    const tables=document.createElement('div');
    tables.classList.add('tables');
    for(const {name,start,end,codepoints,codepoint_names} of info.tables){
      const section=document.createElement('section');
      section.classList.add('table');
      const h3=document.createElement('h3');
      h3.textContent=name;
      section.appendChild(h3);
      const points=new Set(codepoints);
      const names=new Map(codepoint_names.map(({n,name})=>[n,name]));
      for(let cp=start;cp<end;++cp){
        const div=document.createElement('div');
        div.classList.add('codepoint');
        if(!points.has(cp)) div.classList.add('disabled');
        const name=names.get(cp);
        if(name) div.title=name;
        const span=document.createElement('span');
        span.textContent=String.fromCodePoint(cp);
        div.appendChild(span);
        section.appendChild(div);
      }
      tables.appendChild(section);
    }
    container.appendChild(tables);
    clearTimeout(timeout);
  }finally{
    document.body.removeAttribute('inert');
  }
};
['dragenter','dragover','dragleave','drop'].forEach(type=>document.body.addEventListener(type,e=>{
  e.preventDefault();e.stopPropagation();
  document.body.classList.remove('dragover');
}));
document.body.addEventListener('dragover',e=>{
  e.dataTransfer.dropEffect='copy';document.body.classList.add('dragover');
});
document.body.addEventListener('drop',async e=>{
  const file=[...e.dataTransfer.files]?.[0];
  await open(file);
});
document.body.addEventListener('paste',async e=>{
  e.preventDefault();
  const blob=[...e.clipboardData.files]?.[0];
  await open(blob);
});
const uploader=document.querySelector('#file');
uploader.addEventListener('change',async e=>{
  e.preventDefault();
  const file=[...uploader.files]?.[0];
  console.log(file);
  await open(file);
});
</script>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebApplication",
  "name": "Font Subsetter",
  "url": "https://www.couique.com/font",
  "description": "Remove unwanted glyphs, axes and features from a font before converting it to woff2.",
  "applicationCategory": "UtilitiesApplication",
  "browserRequirements": "Requires JavaScript.",
  "operatingSystem": "All",
  "about": {
    "@type": "Thing",
    "description": "Select what to keep among the font glyphs, OpenType features, and the variable font axes, and then save it in the woff2 format."
  },
  "author": {
    "@id":  "https://about.programingjd.me"
  }
}
</script>
</html>
